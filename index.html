table{border-collapse:collapse}

.prizes{flex-direction:column!important}
.st th,.st td{padding:8px 4px!important;font-size:10px!important}
.st td:nth-child(5),.st th:nth-child(5),.st td:nth-child(6),.st th:nth-child(6),.st td:nth-child(7),.st th:nth-child(7){display:none}
.rosters{grid-template-columns:1fr!important}
.dt{font-size:9px!important}
.dt th,.dt td{padding:5px 4px!important}
.divs{grid-template-columns:1fr!important}
.cnt{padding:12px 10px!important}
}
