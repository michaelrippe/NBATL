<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NBA Team League 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#F8F7F4;color:#1A1A1A;-webkit-font-smoothing:antialiased}
.ticker-wrap{background:#111;overflow:hidden;height:36px;position:relative}
.ticker{display:flex;animation:scroll 40s linear infinite;white-space:nowrap;align-items:center;height:36px}
.ticker:hover{animation-play-state:paused}
.ticker-item{padding:0 28px;font-size:11px;font-weight:600;color:#ccc;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.ticker-item .owner{color:#E8A838;font-weight:700}
.ticker-item .vs{color:#666;font-size:9px}
.ticker-item .time{color:#888;font-size:10px;margin-left:4px}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header{text-align:center;padding:28px 16px 18px;background:linear-gradient(180deg,#111 0%,#1A1A1A 100%)}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,36px);color:#fff;font-weight:900;letter-spacing:2px}
.header .sub{font-size:10px;color:#E8A838;letter-spacing:3px;font-weight:700;margin-top:4px}
.content{max-width:720px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.card-hd{background:#111;padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.card-hd span{color:#fff;font-size:11px;font-weight:700;letter-spacing:1.5px}
.card-hd .badge{background:#E8A838;color:#111;font-size:9px;font-weight:800;padding:2px 8px;border-radius:3px;letter-spacing:.5px}
table{width:100%;border-collapse:collapse}
th{font-size:9px;font-weight:700;letter-spacing:1px;color:#888;padding:8px;text-align:center;background:#FAFAF8}
td{padding:8px;text-align:center;font-size:12px;border-bottom:1px solid #F0EDE8}
.mgr-name{text-align:left;font-weight:700;font-size:13px}
.wins-cell{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;color:#2D6A4F}
.gb-cell{font-weight:700;font-size:13px}
.gb-neg{color:#C0392B}
.max-cell{font-weight:800;font-size:12px;color:#E8A838}
.tab-bar{display:flex;gap:0;border-bottom:2px solid #111;margin-bottom:16px}
.tab{flex:1;text-align:center;padding:10px 6px;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;color:#888;background:#FAFAF8;border:none;transition:all .15s}
.tab.active{color:#fff;background:#111}
.logo-circle{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:8px;font-weight:800;color:#fff;flex-shrink:0}
.team-row{display:flex;align-items:center;gap:6px}
.team-sm{font-size:11px;font-weight:600}
.elim{text-decoration:line-through;opacity:.45}
.playoff-tag{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.5px;margin-left:4px}
.playoff-in{background:#2D6A4F;color:#fff}
.playoff-pi{background:#E8A838;color:#111}
.playoff-out{background:#C0392B;color:#fff}
.matchup-card{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #F0EDE8}
.matchup-card:last-child{border-bottom:none}
.matchup-team{display:flex;align-items:center;gap:8px;flex:1}
.matchup-team.away{justify-content:flex-end;text-align:right}
.matchup-vs{font-size:10px;font-weight:800;color:#888;padding:0 10px;letter-spacing:1px}
.matchup-time{font-size:10px;color:#888;font-weight:600;text-align:center;margin-top:2px}
.matchup-owner{font-size:9px;font-weight:700;color:#E8A838}
.countdown{font-family:'Playfair Display',serif;font-size:clamp(28px,6vw,44px);font-weight:900;color:#111;text-align:center;padding:8px}
.countdown-label{font-size:10px;letter-spacing:3px;color:#888;font-weight:700;text-align:center}
.prize-row{display:flex;gap:8px;padding:10px 16px;justify-content:center;flex-wrap:wrap}
.prize-chip{background:#FAFAF8;border:1px solid #E5E2DB;border-radius:6px;padding:6px 12px;text-align:center}
.prize-chip .amt{font-family:'Playfair Display',serif;font-weight:900;font-size:18px;color:#2D6A4F}
.prize-chip .lbl{font-size:8px;font-weight:700;letter-spacing:1px;color:#888}
.progress-bar{height:6px;background:#E5E2DB;border-radius:3px;overflow:hidden;margin:0 16px 12px}
.progress-fill{height:100%;background:linear-gradient(90deg,#E8A838,#2D6A4F);border-radius:3px;transition:width .5s}
.footer{text-align:center;padding:10px 0 16px;font-size:8px;color:#AAA;letter-spacing:.5px}
.section-divider{height:1px;background:linear-gradient(90deg,transparent,#DDD,transparent);margin:8px 0}
@media(max-width:600px){
  .content{padding:10px 8px}
  td,th{padding:6px 4px;font-size:11px}
  .wins-cell{font-size:17px}
  .matchup-card{padding:10px 12px}
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
var useState=React.useState,useEffect=React.useEffect,useMemo=React.useMemo;

function TeamLogo({name,size}){
  var sz=size||28;
  var c=TEAM_COLORS[name]||["#333","#fff"];
  var abbr=TEAM_ABBR[name]||"?";
  var fs=abbr.length>3?7:abbr.length===3?8:9;
  return <span className="logo-circle" style={{width:sz,height:sz,minWidth:sz,background:c[0],fontSize:fs,color:c[1]==='#000'?'#fff':c[1]}}>{abbr}</span>;
}

function TeamName({name,sz,showRecord,rec}){
  var isElim=ELIMINATED.indexOf(name)!==-1;
  var r=(rec&&rec[name])||RC[name]||{w:0,l:0};
  return <span className={"team-row"+(isElim?" elim":"")}>
    <TeamLogo name={name} size={sz||22}/>
    <span className="team-sm">{name}{showRecord?" ("+r.w+"-"+r.l+")":""}</span>
  </span>;
}

function Countdown(){
  var [now,setNow]=useState(new Date());
  useEffect(function(){var t=setInterval(function(){setNow(new Date())},1000);return function(){clearInterval(t)}},[]);
  var diff=SEASON_END-now;
  if(diff<=0) return <div style={{textAlign:"center",padding:16}}><div className="countdown">SEASON OVER</div></div>;
  var d=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);
  return <div style={{padding:"12px 16px"}}>
    <div className="countdown-label">SEASON ENDS IN</div>
    <div className="countdown">{d}d {h}h {m}m {s}s</div>
  </div>;
}

function Ticker({liveGames}){
  // Use live scoreboard if available, else fall back to static schedule
  var items=[];
  if(liveGames&&liveGames.length>0){
    liveGames.forEach(function(g){
      if(!g.away||!g.home) return;
      var ao=OWNER_MAP[g.away.shortName]||"";
      var ho=OWNER_MAP[g.home.shortName]||"";
      var display="";
      if(g.state==="In Progress"){
        display=g.away.score+"-"+g.home.score+" "+g.clock+" Q"+g.period;
      } else if(g.state==="Final"){
        display=g.away.score+"-"+g.home.score+" FINAL";
      } else {
        display=g.time||g.statusDetail||"";
      }
      items.push({
        awayAbbr:TEAM_ABBR[g.away.shortName]||g.away.shortName,
        homeAbbr:TEAM_ABBR[g.home.shortName]||g.home.shortName,
        ao:ao,ho:ho,display:display,live:g.state==="In Progress"
      });
    });
  } else {
    TODAYS_GAMES.forEach(function(g){
      items.push({
        awayAbbr:TEAM_ABBR[g.away],homeAbbr:TEAM_ABBR[g.home],
        ao:OWNER_MAP[g.away]||"",ho:OWNER_MAP[g.home]||"",
        display:g.time,live:false
      });
    });
  }
  if(items.length===0) return null;
  var doubled=items.concat(items).concat(items);
  return <div className="ticker-wrap">
    <div className="ticker">
      {doubled.map(function(g,i){return <span key={i} className="ticker-item">
        {g.awayAbbr} {g.ao?<span className="owner">({g.ao})</span>:null}
        <span className="vs">@</span>
        {g.homeAbbr} {g.ho?<span className="owner">({g.ho})</span>:null}
        <span className="time" style={g.live?{color:"#4CAF50",fontWeight:700}:{}}>{g.display}</span>
        {g.live?<span style={{color:"#4CAF50",fontSize:7,fontWeight:800,animation:"pulse 1.5s infinite"}}>LIVE</span>:null}
      </span>})}
    </div>
  </div>;
}

function App(){
  var [tab,setTab]=useState("standings");
  var [records,setRecords]=useState(RC);
  var [liveGames,setLiveGames]=useState([]);
  var [lastUpdate,setLastUpdate]=useState(null);
  var [loading,setLoading]=useState(true);

  // ESPN API: Fetch standings
  function fetchStandings(){
    return fetch("https://site.api.espn.com/apis/v2/sports/basketball/nba/standings")
      .then(function(r){return r.json()})
      .then(function(data){
        var updated={};
        // Copy fallback first
        Object.keys(RC).forEach(function(k){updated[k]={w:RC[k].w,l:RC[k].l}});
        // Parse ESPN standings
        if(data&&data.children){
          data.children.forEach(function(conf){
            if(conf.standings&&conf.standings.entries){
              conf.standings.entries.forEach(function(entry){
                var espnName=entry.team&&entry.team.displayName;
                var shortName=espnName&&NAME_MAP[espnName];
                if(shortName){
                  var wins=0,losses=0;
                  (entry.stats||[]).forEach(function(st){
                    if(st.name==="wins") wins=parseInt(st.value)||0;
                    if(st.name==="losses") losses=parseInt(st.value)||0;
                  });
                  if(wins>0||losses>0){
                    updated[shortName]={w:wins,l:losses};
                  }
                }
              });
            }
          });
        }
        setRecords(updated);
        setLastUpdate(new Date());
        setLoading(false);
      })
      .catch(function(){setLoading(false)});
  }

  // ESPN API: Fetch today's scoreboard
  function fetchScoreboard(){
    return fetch("https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard")
      .then(function(r){return r.json()})
      .then(function(data){
        if(data&&data.events){
          var games=data.events.map(function(ev){
            var comp=ev.competitions&&ev.competitions[0];
            if(!comp) return null;
            var away=null,home=null;
            (comp.competitors||[]).forEach(function(c){
              var info={
                espnName:c.team&&c.team.displayName,
                shortName:NAME_MAP[c.team&&c.team.displayName]||"",
                score:parseInt(c.score)||0,
                record:c.records&&c.records[0]&&c.records[0].summary||""
              };
              if(c.homeAway==="home") home=info;
              else away=info;
            });
            var status=comp.status||{};
            var statusType=status.type||{};
            var clock=status.displayClock||"";
            var period=status.period||0;
            var stateStr=statusType.description||"Scheduled";
            var startDate=ev.date?new Date(ev.date):null;
            var timeStr="";
            if(startDate&&stateStr==="Scheduled"){
              timeStr=startDate.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
            }
            return {away:away,home:home,state:stateStr,clock:clock,period:period,time:timeStr,statusDetail:statusType.detail||""};
          }).filter(Boolean);
          setLiveGames(games);
        }
      })
      .catch(function(){});
  }

  // Fetch on mount and every 30 seconds
  useEffect(function(){
    fetchStandings();
    fetchScoreboard();
    var t=setInterval(function(){
      fetchStandings();
      fetchScoreboard();
    },30000);
    return function(){clearInterval(t)};
  },[]);

  // Compute manager totals from live records
  var managers=useMemo(function(){
    return MNAMES.map(function(name,i){
      var teams=ROSTERS[i].map(function(t){
        var r=records[t]||{w:0,l:0};
        var gp=r.w+r.l;
        var rem=TOTAL_GAMES-gp;
        return {name:t,w:r.w,l:r.l,gp:gp,rem:rem};
      });
      var tw=0,rem=0,max=0;
      teams.forEach(function(t){tw+=t.w;rem+=t.rem;max+=t.w+t.rem});
      teams.sort(function(a,b){return b.w-a.w});
      return {name:name,teams:teams,tw:tw,rem:rem,max:max};
    }).sort(function(a,b){return b.tw-a.tw});
  },[records]);

  var topW=managers[0].tw;
  var gamesPlayed=Object.values(records).reduce(function(s,r){return s+r.w+r.l},0)/30;
  var pct=Math.round(gamesPlayed/TOTAL_GAMES*100);

  // Playoff bracket data
  var westSeeds=[
    {seed:1,team:"Thunder"},{seed:2,team:"Spurs"},{seed:3,team:"Nuggets"},
    {seed:4,team:"Lakers"},{seed:5,team:"Rockets"},{seed:6,team:"Timberwolves"},
    {seed:7,team:"Suns"},{seed:8,team:"Clippers"},
    {seed:9,team:"Trail Blazers"},{seed:10,team:"Warriors"}
  ];
  var eastSeeds=[
    {seed:1,team:"Pistons"},{seed:2,team:"Celtics"},{seed:3,team:"Knicks"},
    {seed:4,team:"Cavaliers"},{seed:5,team:"Hawks"},{seed:6,team:"Raptors"},
    {seed:7,team:"Magic"},{seed:8,team:"76ers"},
    {seed:9,team:"Hornets"},{seed:10,team:"Heat"}
  ];

  var tabs=[
    {id:"standings",label:"STANDINGS"},
    {id:"matchups",label:"TODAY'S GAMES"},
    {id:"playoffs",label:"PLAYOFF TRACKER"},
    {id:"teams",label:"ALL TEAMS"},
    {id:"history",label:"2024-25"}
  ];

  return <div>
    <Ticker liveGames={liveGames}/>
    <div className="header">
      <h1>NBA TEAM LEAGUE</h1>
      <div className="sub">2025-26 SEASON &bull; $300 PRIZE POOL</div>
    </div>
    <div className="content">
      {/* Countdown + Progress */}
      <div className="card">
        <Countdown/>
        <div style={{padding:"0 16px 4px",display:"flex",justifyContent:"space-between",fontSize:9,fontWeight:700,color:"#888",letterSpacing:1}}>
          <span>SEASON PROGRESS</span><span>{pct}%</span>
        </div>
        <div className="progress-bar"><div className="progress-fill" style={{width:pct+"%"}}/></div>
        <div className="prize-row">
          <div className="prize-chip"><div className="amt">$150</div><div className="lbl">REGULAR SEASON</div></div>
          <div className="prize-chip"><div className="amt">$75</div><div className="lbl">NBA CUP</div></div>
          <div className="prize-chip"><div className="amt">$75</div><div className="lbl">NBA FINALS</div></div>
        </div>
      </div>

      {/* Tab Navigation */}
      <div className="tab-bar">
        {tabs.map(function(t){return <button key={t.id} className={"tab"+(tab===t.id?" active":"")} onClick={function(){setTab(t.id)}}>{t.label}</button>})}
      </div>

      {/* STANDINGS TAB */}
      {tab==="standings"&&<div>
        <div className="card">
          <div className="card-hd">
            <span>LEAGUE STANDINGS</span>
            <span className="badge">{loading?"LOADING...":lastUpdate?"LIVE \u00B7 "+lastUpdate.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"}):"LIVE"}</span>
          </div>
          <table>
            <thead><tr>
              <th>#</th><th style={{textAlign:"left"}}>MANAGER</th><th>WINS</th><th>GB</th><th>LEFT</th><th>MAX</th>
            </tr></thead>
            <tbody>{managers.map(function(m,i){
              var gb=i===0?"-":(topW-m.tw);
              return <tr key={m.name} style={{background:i===0?"#FFFDF5":"transparent"}}>
                <td style={{fontWeight:800,fontFamily:"'Playfair Display',serif",fontSize:15,color:i===0?"#E8A838":"#111"}}>{i+1}</td>
                <td className="mgr-name">{m.name}{m.name==="Rippe"?" \uD83D\uDC51":""}</td>
                <td className="wins-cell">{m.tw}</td>
                <td className={"gb-cell"+(typeof gb==="number"?" gb-neg":"")}>{gb}</td>
                <td style={{fontSize:11,fontWeight:600}}>{m.rem}</td>
                <td className="max-cell">{m.max}</td>
              </tr>;
            })}</tbody>
          </table>
        </div>

        {/* Team Breakdown */}
        {managers.map(function(m){
          return <div className="card" key={m.name}>
            <div className="card-hd">
              <span>{m.name.toUpperCase()}'S TEAMS</span>
              <span className="badge">{m.tw}W</span>
            </div>
            <table>
              <thead><tr><th style={{textAlign:"left"}}>TEAM</th><th>W</th><th>L</th><th>LEFT</th><th>STATUS</th></tr></thead>
              <tbody>{m.teams.map(function(t){
                var isElim=ELIMINATED.indexOf(t.name)!==-1;
                var isClinch=CLINCHED_PLAYOFF.indexOf(t.name)!==-1;
                var isPI=PLAYIN_TEAMS.indexOf(t.name)!==-1;
                return <tr key={t.name} style={{opacity:isElim?.5:1}}>
                  <td style={{textAlign:"left"}}><TeamName name={t.name} sz={20}/></td>
                  <td style={{fontWeight:700}}>{t.w}</td>
                  <td style={{color:"#999"}}>{t.l}</td>
                  <td style={{fontWeight:600}}>{t.rem}</td>
                  <td>{isClinch?<span className="playoff-tag playoff-in">CLINCHED</span>:isPI?<span className="playoff-tag playoff-pi">PLAY-IN</span>:isElim?<span className="playoff-tag playoff-out">OUT</span>:""}</td>
                </tr>;
              })}</tbody>
            </table>
          </div>;
        })}
      </div>}

      {/* TODAY'S MATCHUPS TAB */}
      {tab==="matchups"&&<div>
        <div className="card">
          <div className="card-hd">
            <span>TODAY'S MATCHUPS</span>
            <span className="badge">{(liveGames.length||TODAYS_GAMES.length)+" GAMES"}</span>
          </div>
          {(liveGames.length>0?liveGames:TODAYS_GAMES.map(function(g){
            return {away:{shortName:g.away,score:0},home:{shortName:g.home,score:0},state:"Scheduled",time:g.time,clock:"",period:0};
          })).map(function(g,i){
            if(!g.away||!g.home) return null;
            var aN=g.away.shortName;
            var hN=g.home.shortName;
            var ao=OWNER_MAP[aN]||"Undrafted";
            var ho=OWNER_MAP[hN]||"Undrafted";
            var ar=records[aN]||RC[aN]||{w:0,l:0};
            var hr=records[hN]||RC[hN]||{w:0,l:0};
            var isLive=g.state==="In Progress";
            var isFinal=g.state==="Final";
            var statusText=isLive?g.clock+" Q"+g.period:isFinal?"FINAL":g.time||g.statusDetail||"";
            return <div className="matchup-card" key={i} style={isLive?{background:"#FFFDF5"}:{}}>
              <div className="matchup-team" style={{flexDirection:"column",alignItems:"flex-start"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <TeamLogo name={aN} size={32}/>
                  <div>
                    <div style={{fontWeight:700,fontSize:13}}>{aN}</div>
                    <div style={{fontSize:10,color:"#888"}}>{ar.w}-{ar.l}</div>
                  </div>
                </div>
                <div className="matchup-owner">{ao}</div>
              </div>
              <div style={{textAlign:"center"}}>
                {(isLive||isFinal)?<div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:18,color:isLive?"#2D6A4F":"#111"}}>{g.away.score} - {g.home.score}</div>:<div className="matchup-vs">VS</div>}
                <div className="matchup-time" style={isLive?{color:"#4CAF50",fontWeight:700}:{}}>{statusText}</div>
                {isLive&&<div style={{fontSize:7,fontWeight:800,color:"#4CAF50",letterSpacing:1,marginTop:2}}>LIVE</div>}
              </div>
              <div className="matchup-team away" style={{flexDirection:"column",alignItems:"flex-end"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:700,fontSize:13}}>{hN}</div>
                    <div style={{fontSize:10,color:"#888"}}>{hr.w}-{hr.l}</div>
                  </div>
                  <TeamLogo name={hN} size={32}/>
                </div>
                <div className="matchup-owner">{ho}</div>
              </div>
            </div>;
          })}
        </div>
        <div className="card" style={{padding:16,textAlign:"center"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#111",marginBottom:4}}>LEAGUE MATCHUP IMPACT</div>
          <div style={{fontSize:10,color:"#888",lineHeight:1.6}}>
            {(liveGames.length>0?liveGames:TODAYS_GAMES.map(function(g){return {away:{shortName:g.away},home:{shortName:g.home}}})).map(function(g,i){
              if(!g.away||!g.home) return null;
              var aN=g.away.shortName,hN=g.home.shortName;
              var ao=OWNER_MAP[aN]||"",ho=OWNER_MAP[hN]||"";
              if(!ao&&!ho) return <span key={i}>{TEAM_ABBR[aN]||aN} @ {TEAM_ABBR[hN]||hN} — <span style={{color:"#888"}}>No league impact</span><br/></span>;
              if(ao&&ho&&ao===ho) return <span key={i}>{TEAM_ABBR[aN]||aN} @ {TEAM_ABBR[hN]||hN} — <span style={{color:"#2D6A4F",fontWeight:700}}>{ao.toUpperCase()} GUARANTEED WIN</span><br/></span>;
              if(ao&&ho) return <span key={i}>{aN} ({ao}) @ {hN} ({ho}) — <b style={{color:"#C0392B"}}>HEAD TO HEAD</b><br/></span>;
              return <span key={i}>{TEAM_ABBR[aN]||aN} ({ao||"Undrafted"}) @ {TEAM_ABBR[hN]||hN} ({ho||"Undrafted"})<br/></span>;
            })}
          </div>
        </div>
      </div>}

      {/* PLAYOFF TRACKER TAB */}
      {tab==="playoffs"&&<div>
        <div className="card">
          <div className="card-hd"><span>WESTERN CONFERENCE</span><span className="badge">BRACKET</span></div>
          <div style={{padding:12}}>
            <div style={{fontSize:9,fontWeight:700,color:"#888",letterSpacing:1,marginBottom:8}}>CLINCHED (1-6)</div>
            {westSeeds.slice(0,6).map(function(s){
              var owner=OWNER_MAP[s.team]||"Undrafted";
              var r=records[s.team]||RC[s.team];
              return <div key={s.seed} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #F0EDE8"}}>
                <span style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,width:24,textAlign:"center",color:"#E8A838"}}>{s.seed}</span>
                <TeamLogo name={s.team} size={26}/>
                <span style={{fontWeight:700,fontSize:12,flex:1}}>{s.team} <span style={{color:"#888",fontWeight:500}}>({r.w}-{r.l})</span></span>
                <span style={{fontSize:10,fontWeight:700,color:"#E8A838"}}>{owner}</span>
                <span className="playoff-tag playoff-in">IN</span>
              </div>;
            })}
            <div style={{fontSize:9,fontWeight:700,color:"#888",letterSpacing:1,marginTop:12,marginBottom:8}}>PLAY-IN (7-10)</div>
            {westSeeds.slice(6).map(function(s){
              var owner=OWNER_MAP[s.team]||"Undrafted";
              var r=records[s.team]||RC[s.team];
              return <div key={s.seed} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #F0EDE8"}}>
                <span style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,width:24,textAlign:"center",color:"#888"}}>{s.seed}</span>
                <TeamLogo name={s.team} size={26}/>
                <span style={{fontWeight:700,fontSize:12,flex:1}}>{s.team} <span style={{color:"#888",fontWeight:500}}>({r.w}-{r.l})</span></span>
                <span style={{fontSize:10,fontWeight:700,color:"#E8A838"}}>{owner}</span>
                <span className="playoff-tag playoff-pi">PLAY-IN</span>
              </div>;
            })}
          </div>
        </div>

        <div className="card">
          <div className="card-hd"><span>EASTERN CONFERENCE</span><span className="badge">BRACKET</span></div>
          <div style={{padding:12}}>
            <div style={{fontSize:9,fontWeight:700,color:"#888",letterSpacing:1,marginBottom:8}}>CLINCHED (1-6)</div>
            {eastSeeds.slice(0,6).map(function(s){
              var owner=OWNER_MAP[s.team]||"Undrafted";
              var r=records[s.team]||RC[s.team];
              return <div key={s.seed} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #F0EDE8"}}>
                <span style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,width:24,textAlign:"center",color:"#E8A838"}}>{s.seed}</span>
                <TeamLogo name={s.team} size={26}/>
                <span style={{fontWeight:700,fontSize:12,flex:1}}>{s.team} <span style={{color:"#888",fontWeight:500}}>({r.w}-{r.l})</span></span>
                <span style={{fontSize:10,fontWeight:700,color:"#E8A838"}}>{owner}</span>
                <span className="playoff-tag playoff-in">IN</span>
              </div>;
            })}
            <div style={{fontSize:9,fontWeight:700,color:"#888",letterSpacing:1,marginTop:12,marginBottom:8}}>PLAY-IN (7-10)</div>
            {eastSeeds.slice(6).map(function(s){
              var owner=OWNER_MAP[s.team]||"Undrafted";
              var r=records[s.team]||RC[s.team];
              return <div key={s.seed} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #F0EDE8"}}>
                <span style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,width:24,textAlign:"center",color:"#888"}}>{s.seed}</span>
                <TeamLogo name={s.team} size={26}/>
                <span style={{fontWeight:700,fontSize:12,flex:1}}>{s.team} <span style={{color:"#888",fontWeight:500}}>({r.w}-{r.l})</span></span>
                <span style={{fontSize:10,fontWeight:700,color:"#E8A838"}}>{owner}</span>
                <span className="playoff-tag playoff-pi">PLAY-IN</span>
              </div>;
            })}
          </div>
        </div>

        <div className="card">
          <div className="card-hd"><span>ELIMINATED</span><span className="badge" style={{background:"#C0392B",color:"#fff"}}>{ELIMINATED.length} OUT</span></div>
          <div style={{padding:12}}>
            {ELIMINATED.map(function(t){
              var owner=OWNER_MAP[t]||"Undrafted";
              var r=records[t]||RC[t];
              return <div key={t} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid #F0EDE8",opacity:.5}}>
                <TeamLogo name={t} size={24}/>
                <span style={{fontWeight:600,fontSize:12,flex:1,textDecoration:"line-through"}}>{t} <span style={{color:"#888",fontWeight:400}}>({r.w}-{r.l})</span></span>
                <span style={{fontSize:10,fontWeight:700,color:"#888"}}>{owner}</span>
                <span className="playoff-tag playoff-out">OUT</span>
              </div>;
            })}
          </div>
        </div>

        {/* Manager Playoff Summary */}
        <div className="card">
          <div className="card-hd"><span>PLAYOFF TEAMS BY MANAGER</span><span className="badge">FINALS $75</span></div>
          <div style={{padding:12}}>
            {MNAMES.map(function(name,i){
              var pTeams=ROSTERS[i].filter(function(t){return CLINCHED_PLAYOFF.indexOf(t)!==-1});
              var piTeams=ROSTERS[i].filter(function(t){return PLAYIN_TEAMS.indexOf(t)!==-1});
              var eTeams=ROSTERS[i].filter(function(t){return ELIMINATED.indexOf(t)!==-1});
              return <div key={name} style={{marginBottom:12,paddingBottom:12,borderBottom:i<3?"1px solid #F0EDE8":"none"}}>
                <div style={{fontWeight:800,fontSize:13,marginBottom:6}}>{name}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {pTeams.map(function(t){return <span key={t} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#E8F5E9",padding:"3px 8px",borderRadius:4,fontSize:10,fontWeight:600}}>
                    <TeamLogo name={t} size={16}/>{TEAM_ABBR[t]} <span style={{color:"#2D6A4F"}}>IN</span>
                  </span>})}
                  {piTeams.map(function(t){return <span key={t} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#FFF8E1",padding:"3px 8px",borderRadius:4,fontSize:10,fontWeight:600}}>
                    <TeamLogo name={t} size={16}/>{TEAM_ABBR[t]} <span style={{color:"#E8A838"}}>PI</span>
                  </span>})}
                  {eTeams.map(function(t){return <span key={t} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#FFEBEE",padding:"3px 8px",borderRadius:4,fontSize:10,fontWeight:600,opacity:.5,textDecoration:"line-through"}}>
                    <TeamLogo name={t} size={16}/>{TEAM_ABBR[t]}
                  </span>})}
                </div>
              </div>;
            })}
          </div>
        </div>
      </div>}

      {/* ALL TEAMS TAB */}
      {tab==="teams"&&<div>
        <div className="card">
          <div className="card-hd"><span>ALL 30 TEAMS</span></div>
          <table>
            <thead><tr><th style={{textAlign:"left"}}>TEAM</th><th>W</th><th>L</th><th>LEFT</th><th>OWNER</th><th>STATUS</th></tr></thead>
            <tbody>{Object.keys(records).sort(function(a,b){return (records[b]||RC[b]).w-(records[a]||RC[a]).w}).map(function(t){
              var r=records[t]||RC[t];
              var gp=r.w+r.l;
              var rem=TOTAL_GAMES-gp;
              var owner=OWNER_MAP[t]||"—";
              var isElim=ELIMINATED.indexOf(t)!==-1;
              var isClinch=CLINCHED_PLAYOFF.indexOf(t)!==-1;
              var isPI=PLAYIN_TEAMS.indexOf(t)!==-1;
              return <tr key={t} style={{opacity:isElim?.45:1}}>
                <td style={{textAlign:"left"}}><TeamName name={t} sz={18}/></td>
                <td style={{fontWeight:700}}>{r.w}</td>
                <td style={{color:"#999"}}>{r.l}</td>
                <td>{rem}</td>
                <td style={{fontSize:10,fontWeight:700,color:"#E8A838"}}>{owner}</td>
                <td>{isClinch?<span className="playoff-tag playoff-in">IN</span>:isPI?<span className="playoff-tag playoff-pi">PI</span>:isElim?<span className="playoff-tag playoff-out">OUT</span>:""}</td>
              </tr>;
            })}</tbody>
          </table>
        </div>
      </div>}

      {/* 2024-25 HISTORY TAB */}
      {tab==="history"&&<div>
        <div className="card">
          <div className="card-hd"><span>2024-25 FINAL RESULTS</span><span className="badge">COMPLETE</span></div>
          <table>
            <thead><tr><th>#</th><th style={{textAlign:"left"}}>MANAGER</th><th>WINS</th></tr></thead>
            <tbody>{HIST.rosters.map(function(m,i){
              return <tr key={m.name} style={{background:i===0?"#FFFDF5":"transparent"}}>
                <td style={{fontWeight:800,fontFamily:"'Playfair Display',serif",color:i===0?"#E8A838":"#111"}}>{i+1}</td>
                <td className="mgr-name">{m.name}{i===0?" \uD83D\uDC51":""}</td>
                <td className="wins-cell">{m.w}</td>
              </tr>;
            })}</tbody>
          </table>
        </div>
        <div className="card" style={{padding:16}}>
          <div style={{fontSize:11,fontWeight:700,marginBottom:8}}>AWARDS</div>
          <div style={{fontSize:11,color:"#555",lineHeight:1.8}}>
            <b>NBA Cup Champion:</b> {HIST.cup} (def. {HIST.cupLoser}) — MVP: {HIST.cupMVP}<br/>
            <b>NBA Finals Champion:</b> {HIST.finals} (def. {HIST.finalsLoser} in 7) — MVP: {HIST.finalsMVP}
          </div>
        </div>
      </div>}

      <div className="footer">NBA Team League 2026 — Est. 2024 — $300 Pool — Defending Champ: Rippe \uD83D\uDC51</div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
